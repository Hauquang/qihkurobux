<!DOCTYPE html>
<html>
<head>
    <title>Admin qihkurobux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Danh sách đơn hàng cần duyệt</h2>
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>User</th>
                <th>Robux</th>
                <th>Link Gamepass</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            {% for o in orders %}
            <tr>
                <td>{{ o.user }}</td>
                <td>{{ o.amount }}</td>
                <td><a href="{{ o.link }}" target="_blank" class="btn btn-sm btn-outline-info">Mở Link</a></td>
                <td><span class="badge bg-warning">Đang chờ</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
