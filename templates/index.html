<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qihkurobux - Shop Robux Uy Tín</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: white; }
        .btn-info { background-color: #00cfef; border: none; color: black; font-weight: bold; }
    </style>
</head>
<body class="container mt-5 text-center">
    <h1 class="text-info fw-bold">QIHKU ROBUX</h1>
    <p>Hệ thống rút Robux qua Gamepass tự động</p>

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-3">Lệnh Rút Robux</h4>
                <form action="/rut-robux" method="POST">
                    <input type="text" name="username" class="form-control mb-3" placeholder="Tên tài khoản Roblox" required>
                    <input type="number" name="amount" class="form-control mb-3" placeholder="Số Robux muốn rút" required>
                    <input type="url" name="gamepass" class="form-control mb-3" placeholder="Link Gamepass của bạn" required>
                    <button type="submit" class="btn btn-info w-100">GỬI ĐƠN NGAY</button>
                </form>
            </div>
            <p class="mt-3 text-secondary small text-start">* Chú ý: Hãy tạo sẵn Gamepass trước khi gửi đơn.</p>
        </div>
    </div>
</body>
</html>
