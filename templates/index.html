<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QIHKU ROBUX SHOP</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; }
        .container { background: white; max-width: 500px; margin: 30px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 95%; border-radius: 5px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QIHKU SHOP</h1>
        {% if user %}
            <p>Xin chào, <b>{{ user.username }}</b></p>
            <p>Số dư: <span style="color: red; font-size: 20px;">{{ user.balance }}đ</span></p>
            <hr>
            <h3>MUA ROBUX (150đ/1RB)</h3>
            <form action="/buy-robux" method="post">
                <input type="text" name="ingame_game" placeholder="Tên tài khoản Roblox" required>
                <input type="number" name="amount" placeholder="Số lượng Robux" required>
                <input type="text" name="gamepass_link" placeholder="Link Gamepass" required>
                <button type="submit" class="btn">MUA NGAY</button>
            </form>
            
            <h3>LỊCH SỬ GIAO DỊCH</h3>
            <table>
                <tr>
                    <th>Tên Roblox</th>
                    <th>Robux</th>
                    <th>Trạng thái</th>
                </tr>
                {% for item in history %}
                <tr>
                    <td>{{ item.ingame_game }}</td>
                    <td>{{ item.amount }}</td>
                    <td><b>{{ item.status }}</b></td>
                </tr>
                {% endfor %}
            </table>
            <br><a href="/logout">Đăng xuất</a>
        {% else %}
            <h3>ĐĂNG NHẬP</h3>
            <form action="/login" method="post">
                <input type="text" name="username" placeholder="Tên tài khoản web" required>
                <input type="password" name="password" placeholder="Mật khẩu" required>
                <button type="submit" class="btn">Vào Cửa Hàng</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
